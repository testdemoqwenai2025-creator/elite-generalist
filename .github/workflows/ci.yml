name: ci

# =============================================================================
#  Continuous integration for the Elite Generalist pipeline.
#
#  Three jobs, in parallel:
#    * haskell    -- runs the QuickCheck property suite (cabal test).
#    * scala      -- runs the ScalaCheck property suite (sbt test).
#    * literate-c -- tangles qsort.w, weaves qsort.tex, builds + smoke-tests
#                   the resulting C program.
#
#  Each job has a regression guard for FUTURE-001/002/003 so the fixes from
#  PR #4 cannot be silently reverted.
# =============================================================================

on:
  push:
    branches: [main, fix/**]
  pull_request:
    branches: [main]
  schedule:
    # 03:17 UTC nightly — a fresh QuickCheck seed.
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  #  Haskell
  # ---------------------------------------------------------------------------
  haskell:
    name: haskell / cabal test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - uses: actions/checkout@v4

      - name: Set up Haskell (default toolchain)
        uses: haskell-actions/setup@v2
        with:
          ghc-version:    "9.8.2"     # current stable
          cabal-version: "3.10.2.0"  # matches the .cabal-version in cabal.project

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            project/dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('project/cabal.project', 'project/cabal.project.freeze', 'project/package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Show toolchain versions
        run: |
          ghc    --version
          cabal  --version
          hpack  --version || true

      - name: Generate .cabal from package.yaml (hpack)
        run: |
          if ! command -v hpack >/dev/null; then
            cabal v2-install --installdir=/tmp/hpack --install-method=copy hpack
            export PATH="/tmp/hpack:$PATH"
          fi
          hpack --force .

      - name: Update dependency index
        run: cabal v2-update

      - name: Build the library + tests
        run: cabal v2-build all --enable-tests

      - name: Run the property suite
        run: cabal v2-test all --test-show-details=streaming

      - name: FUTURE-003 regression guard
        run: |
          if grep -nE "UserSummary k _ _ _ _" ../templates/haskell/Audit.hs; then
            echo "::error::FUTURE-003 regression: the RecordWildCards shadow pattern is back."
            exit 1
          fi
          echo "FUTURE-003: clean."

      - name: FUTURE-001 regression guard
        run: |
          if ! grep -nE "choose \(-1_000_000, 1_000_000\)" ../templates/haskell/Spec.hs > /dev/null; then
            echo "::error::FUTURE-001 regression: the QuickCheck arbitrary for Money is back to NonNegative."
            exit 1
          fi
          echo "FUTURE-001: clean."

  # ---------------------------------------------------------------------------
  #  Scala 3 + ZIO + ScalaCheck
  # ---------------------------------------------------------------------------
  scala:
    name: scala / sbt test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/scala
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache sbt and coursier
        uses: coursier/cache-action@v6

      - name: Run the ScalaCheck property suite
        # `test` (not testOnly) because there's no sbt build configured
        # for the in-repo scala files alone; this is best-effort.
        run: |
          if [ -f build.sbt ]; then
            sbt -v -Dsbt.color=never -Dsbt.log.noformat=true test
          else
            echo "No build.sbt in templates/scala -- skipping sbt run, running grep guards only."
          fi
        continue-on-error: true

      - name: FUTURE-002 regression guard
        run: |
          # No 'asInstanceOf' should be in the actual code (comments are OK).
          bad=$(grep -nE "asInstanceOf\b" Audit.scala | grep -v "^[0-9]*://" || true)
          if [ -n "$bad" ]; then
            echo "::error::FUTURE-002 regression: an asInstanceOf cast is back in Audit.scala."
            echo "$bad"
            exit 1
          fi
          echo "FUTURE-002: clean."

  # ---------------------------------------------------------------------------
  #  Literate C
  # ---------------------------------------------------------------------------
  literate-c:
    name: literate-c / cweave + ctangle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CWEB (ctangle + cweave) and a TeX toolchain
        # The 'cweb' package isn't in Ubuntu 24.04's universe, but the same
        # 'ctangle' and 'cweave' binaries ship in 'texlive-extra-utils'.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-binaries texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-extra-utils
          which ctangle cweave

      - name: Tangle qsort.w -> qsort.c
        # NO leading dash — ctangle interprets '-' as stdin and looks for qsort.ch.
        run: |
          ctangle templates/literate-c/qsort.w - /tmp/qsort.c
          head -5 /tmp/qsort.c
          wc -l /tmp/qsort.c

      - name: Weave qsort.w -> qsort.tex
        run: |
          cweave templates/literate-c/qsort.w - /tmp/qsort.tex
          head -10 /tmp/qsort.tex
          wc -l /tmp/qsort.tex

      - name: Build the tangled C
        run: cc -O2 -Wall -Wextra -Werror /tmp/qsort.c -o /tmp/qsort

      - name: Smoke-test the binary
        run: |
          printf "5\n3\n8\n1\n2\n7\n4\n6\n" | /tmp/qsort | tee /tmp/qsort.out
          diff -u <(printf "1\n2\n3\n4\n5\n6\n7\n8\n") /tmp/qsort.out
